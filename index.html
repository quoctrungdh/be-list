* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #faf9f6; font-family: 'Nunito', sans-serif; }

}

@media (min-width: 600px) {

}

.tabbar {
  flex-shrink: 0;
  background: #fff;

  display: flex; align-items: stretch;

  padding-right: env(safe-area-inset-right);
}
.tab-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;

  font-size: 10px; font-weight: 600; color: #b0a898; letter-spacing: .02em;
  -webkit-tap-highlight-color: transparent;
}
.tab-item.active { color: #1e2d40; }
.tab-icon { font-size: 22px; transition: transform .15s; }
.tab-item.active .tab-icon { transform: scale(1.1); }

.header {

.search-wrap { padding: 10px 20px; background: #fff; border-bottom: 1px solid #ece9e3; flex-shrink: 0; }
.search-input {

}
.search-wrap-inner { position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; color: #b0a898; pointer-events: none; }

.song-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 20px;
  border-bottom: 1px solid #f0ede7;
  cursor: pointer; transition: background .1s;
  -webkit-tap-highlight-color: transparent;
}
.song-row:active { background: #f5f2ec; }
.song-num { font-size: 11px; color: #c8c0b4; font-weight: 600; width: 36px; text-align: right; flex-shrink: 0; }
.song-info { flex: 1; min-width: 0; }
.song-title { font-size: 14px; font-weight: 600; color: #1e2d40; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-badge { display: inline-block; font-size: 10px; font-weight: 700; color: #8a7f72; background: #ece9e3; border-radius: 5px; padding: 1px 6px; margin-top: 3px; }
.heart-btn { font-size: 20px; cursor: pointer; padding: 4px; flex-shrink: 0; transition: transform .12s; -webkit-tap-highlight-color: transparent; }
.heart-btn:active { transform: scale(1.3); }

.section-hd { padding: 14px 20px 6px; font-size: 11px; font-weight: 800; color: #b0a898; text-transform: uppercase; letter-spacing: .08em; }

.topic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px 20px; }
.topic-card {
  border-radius: 16px; padding: 16px 14px 14px;
  cursor: pointer; transition: transform .12s, box-shadow .12s;
  -webkit-tap-highlight-color: transparent;
}
.topic-card:active { transform: scale(.97); }
.topic-emoji { font-size: 28px; margin-bottom: 8px; display: block; }
.topic-name { font-size: 13px; font-weight: 800; color: #1e2d40; line-height: 1.3; }
.topic-count { font-size: 11px; color: #8a7f72; margin-top: 2px; font-weight: 600; }

.shuffle-btn {
  display: flex; align-items: center; gap: 8px; justify-content: center;
  background: #f5a623; border: none; border-radius: 14px;
  padding: 12px 20px; font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 800; color: #fff; cursor: pointer;

}
.shuffle-btn:active { transform: scale(.97); box-shadow: 0 2px 6px rgba(245,166,35,.35); }

.back-btn { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 700; color: #5a8fc2; cursor: pointer; padding: 4px 0; -webkit-tap-highlight-color: transparent; }

.empty-state { text-align: center; padding: 48px 32px; color: #c8c0b4; }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; font-weight: 600; line-height: 1.6; }

.voice-hint {

  {id:'Thing 7', emoji:'📦', color:'#f5f5f5', count:3},
  {id:'Fairy Tale', emoji:'🧚', color:'#f8eeff', count:25},
  {id:'Grape Seed', emoji:'🍇', color:'#f0eeff', count:25},
  {id:'Usborne Phonics Reader', emoji:'📗', color:'#efffef', count:12},
  {id:'I am', emoji:'⭐', color:'#fffbe6', count:10},
  {id:'CoCoMelon', emoji:'🍉', color:'#fff5ee', count:24}
];

function HeartBtn({ id, favs, toggle }) {
  const on = favs.has(id);
  return (
    <span className="heart-btn" onClick={e => { e.stopPropagation(); toggle(id); }}>
      {on ? '❤️' : '🤍'}
    </span>
  );
}

function SongRow({ song, favs, toggleFav }) {
  return (
    <div className="song-row">
      <span className="song-num">#{song.id}</span>
      <div className="song-info">
        <div className="song-title" title={song.title}>{song.title}</div>
        {song.topic && <span className="song-badge">{song.topic}</span>}
      </div>
      <HeartBtn id={song.id} favs={favs} toggle={toggleFav} />
    </div>
  );
}

function TabList({ favs, toggleFav }) {
  const [query, setQuery] = React.useState('');

  const filtered = React.useMemo(() => {
    if (!query.trim()) return ALL_SONGS;
    const q = query.toLowerCase();
    return ALL_SONGS.filter(s =>
      s.title.toLowerCase().includes(q) ||
      String(s.id).includes(q) ||
      s.topic.toLowerCase().includes(q)
    );
  }, [query]);

  return (
    <>
      <div className="header">
        <div className="header-title">Danh sách</div>
        <div className="header-sub">{ALL_SONGS.length} bài · cuộn để duyệt</div>
      </div>
      <div className="search-wrap">
        <div className="search-wrap-inner">
          <span className="search-icon">🔍</span>
          <input className="search-input" placeholder="Tìm số bài, tên, chủ đề…" value={query} onChange={e => setQuery(e.target.value)} />
        </div>
      </div>
      <div className="screen-scroll">
        {filtered.length === 0 && (
          <div className="empty-state">
            <div className="empty-icon">🔍</div>
            <p>Không tìm thấy bài nào<br/>phù hợp với từ khoá này</p>
          </div>
        )}
        {query.trim() && filtered.length > 0 && (
          <div className="section-hd">{filtered.length} kết quả</div>
        )}
        {filtered.map(s => <SongRow key={s.id} song={s} favs={favs} toggleFav={toggleFav} />)}
      </div>
    </>
  );
}

function TabTopic({ favs, toggleFav }) {
  const [activeTopic, setActiveTopic] = React.useState(null);

  if (activeTopic) {
    const topic = TOPICS.find(t => t.id === activeTopic);
    const songs = ALL_SONGS.filter(s => s.topic === activeTopic);
    return (
      <>
        <div className="header">
          <div className="back-btn" onClick={() => setActiveTopic(null)}>‹ Chủ đề</div>
          <div className="header-title">{topic.emoji} {activeTopic}</div>
          <div className="header-sub">{songs.length} bài</div>
        </div>
        <div className="screen-scroll">
          <button className="shuffle-btn" onClick={() => {}}>🔀 Phát ngẫu nhiên chủ đề này</button>
          {songs.map(s => <SongRow key={s.id} song={s} favs={favs} toggleFav={toggleFav} />)}
        </div>
      </>
    );
  }

  return (
    <>
      <div className="header">
        <div className="header-title">Chủ đề</div>
        <div className="header-sub">{TOPICS.length} chủ đề</div>
      </div>
      <div className="screen-scroll">
        <div className="topic-grid">
          {TOPICS.map(t => (
            <div key={t.id} className="topic-card" style={{ background: t.color }} onClick={() => setActiveTopic(t.id)}>
              <span className="topic-emoji">{t.emoji}</span>
              <div className="topic-name">{t.id}</div>
              <div className="topic-count">{t.count} bài</div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

const HISTORY_DEFAULT = ['cocomelon', 'peppa', 'sight word', 'fairy tale'];

function TabSearch({ favs, toggleFav }) {
  const [query, setQuery] = React.useState('');
  const [history, setHistory] = React.useState(HISTORY_DEFAULT);

  const results = React.useMemo(() => {
    if (!query.trim()) return [];
    const q = query.toLowerCase();
    return ALL_SONGS.filter(s =>
      s.title.toLowerCase().includes(q) ||
      String(s.id).includes(q) ||
      s.topic.toLowerCase().includes(q)
    );
  }, [query]);

  const doSearch = (q) => {
    setQuery(q);
    if (q.trim() && !history.includes(q.toLowerCase())) {
      setHistory(h => [q.toLowerCase(), ...h].slice(0, 6));
    }
  };

  return (
    <>
      <div className="header">
        <div className="header-title">Tìm kiếm</div>
      </div>
      <div className="search-wrap">
        <div className="search-wrap-inner">
          <span className="search-icon">🔍</span>
          <input
            className="search-input"
            placeholder="Tên bài, số thứ tự, chủ đề…"
            value={query}
            onChange={e => doSearch(e.target.value)}
          />
        </div>
      </div>
      <div className="screen-scroll">
        <div className="voice-hint">
          <span>🎤</span>
          <span>Tìm bằng giọng nói</span>
          <span className="voice-badge">Sắp có</span>
        </div>
        {query.trim().length === 0 && (
          <>
            <div className="section-hd">Tìm gần đây</div>
            <div style={{padding:'4px 20px 12px'}}>
              {history.map(h => (
                <span key={h} className="history-chip" onClick={() => doSearch(h)}>
                  🕐 {h}
                </span>
              ))}
            </div>
          </>
        )}
        {query.trim().length > 0 && results.length === 0 && (
          <div className="empty-state">
            <div className="empty-icon">😕</div>
            <p>Không tìm thấy bài nào<br/>với từ khoá "{query}"</p>
          </div>
        )}
        {results.length > 0 && (
          <>
            <div className="section-hd">{results.length} kết quả cho "{query}"</div>
            {results.map(s => <SongRow key={s.id} song={s} favs={favs} toggleFav={toggleFav} />)}
          </>
        )}
      </div>
    </>
  );
}

function TabFav({ favs, toggleFav }) {
  const favSongs = ALL_SONGS.filter(s => favs.has(s.id));
  return (
    <>
      <div className="header">
        <div className="header-title">Yêu thích</div>
        <div className="header-sub">{favSongs.length} bài đã lưu</div>
      </div>
      <div className="screen-scroll">
        {favSongs.length > 0 && (
          <button className="shuffle-btn">🔀 Phát ngẫu nhiên yêu thích</button>
        )}
        {favSongs.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">🤍</div>
            <p>Chưa có bài nào<br/>Nhấn 🤍 ở bất kỳ bài nào<br/>để thêm vào đây</p>
          </div>
        ) : (
          favSongs.map(s => <SongRow key={s.id} song={s} favs={favs} toggleFav={toggleFav} />)
        )}
      </div>
    </>
  );
}

const TABS = [
  {id:'list',  label:'Danh sách', icon:'📋'},
  {id:'topic', label:'Chủ đề',   icon:'🗂'},
  {id:'search',label:'Tìm',      icon:'🔍'},
  {id:'fav',   label:'Yêu thích',icon:'❤️'},
];

function App() {
  const [tab, setTab] = React.useState('list');
  const [favs, setFavs] = React.useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem('nhac_favs') || '[]')); } catch { return new Set(); }
  });

  const toggleFav = React.useCallback(id => {
    setFavs(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      localStorage.setItem('nhac_favs', JSON.stringify([...next]));
      return next;
    });
  }, []);

  return (
    <div className="app">
      <div className="screen">
        {tab === 'list'   && <TabList   favs={favs} toggleFav={toggleFav} />}
        {tab === 'topic'  && <TabTopic  favs={favs} toggleFav={toggleFav} />}
        {tab === 'search' && <TabSearch favs={favs} toggleFav={toggleFav} />}
        {tab === 'fav'    && <TabFav    favs={favs} toggleFav={toggleFav} />}
      </div>
      <div className="tabbar">
        {TABS.map(t => (
          <div key={t.id} className={`tab-item${tab===t.id?' active':''}`} onClick={() => setTab(t.id)}>
            <span className="tab-icon">{t.icon}</span>
            {t.label}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
<div id="root"></div>
</body>
